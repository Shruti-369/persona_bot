<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bf_bot</title>
        <style>
            :root {
                --wa-bg: #0b141a;
                --wa-header: #202c33;
                --wa-panel: #111b21;
                --wa-in-bubble: #202c33;
                --wa-out-bubble: #005c4b;
                --wa-accent: #00a884;
                --wa-text: #e9edef;
                --wa-subtext: #8696a0;
                --wa-pattern: #0b141a;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                height: 100%;
                font-family: "Segoe UI", Helvetica, Arial, sans-serif;
            }

            .phone {
                width: 100vw;
                height: 100vh;
                background: var(--wa-bg);
                overflow: hidden;
                display: flex;
                flex-direction: column;
                position: relative;
            }

            /* Header */
            .chat-header {
                background: var(--wa-header);
                color: var(--wa-text);
                padding: 12px 24px;
                display: flex;
                align-items: center;
                gap: 12px;
                flex-shrink: 0;
                z-index: 2;
                width: 100%;
                max-width: 900px;
                margin: 0 auto;
                box-sizing: border-box;
            }

            .avatar {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                background: linear-gradient(135deg, #ff8a65, #ff7043);
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 600;
                font-size: 15px;
                color: white;
                flex-shrink: 0;
            }

            .header-info {
                flex: 1;
                min-width: 0;
            }

            .header-name {
                font-size: 15.5px;
                font-weight: 500;
            }

            .header-status {
                font-size: 12.5px;
                color: var(--wa-subtext);
            }

            .header-status.typing {
                color: var(--wa-accent);
            }

            .header-icons {
                display: flex;
                gap: 18px;
                color: var(--wa-subtext);
                font-size: 18px;
            }

            /* Chat body */
            .chat-body {
                flex: 1;
                overflow-y: auto;
                padding: 18px 0;
                background-color: var(--wa-pattern);
                background-image:
                    radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                    radial-gradient(circle at 60% 70%, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
                background-size: 30px 30px;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }

            .chat-body-inner {
                width: 100%;
                max-width: 900px;
                margin: 0 auto;
                padding: 0 24px;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }

            .day-chip {
                align-self: center;
                background: var(--wa-header);
                color: var(--wa-subtext);
                font-size: 12px;
                padding: 5px 12px;
                border-radius: 8px;
                margin: 10px 0;
            }

            .row {
                display: flex;
                margin: 2px 0;
            }

            .row.in {
                justify-content: flex-start;
            }

            .row.out {
                justify-content: flex-end;
            }

            .bubble {
                max-width: 78%;
                padding: 6px 9px 8px 9px;
                border-radius: 8px;
                font-size: 14.2px;
                line-height: 1.35;
                color: var(--wa-text);
                position: relative;
                white-space: pre-wrap;
                word-wrap: break-word;
            }

            .row.in .bubble {
                background: var(--wa-in-bubble);
                border-top-left-radius: 2px;
            }

            .row.out .bubble {
                background: var(--wa-out-bubble);
                border-top-right-radius: 2px;
            }

            .meta {
                display: block;
                text-align: right;
                font-size: 10.5px;
                color: var(--wa-subtext);
                margin-top: 3px;
                margin-left: 8px;
                float: right;
            }

            .ticks {
                color: #53bdeb;
                margin-left: 3px;
            }

            .typing-bubble {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 10px 12px;
            }

            .typing-bubble span {
                width: 6px;
                height: 6px;
                background: var(--wa-subtext);
                border-radius: 50%;
                display: inline-block;
                animation: blink 1.2s infinite ease-in-out;
            }

            .typing-bubble span:nth-child(2) {
                animation-delay: 0.2s;
            }

            .typing-bubble span:nth-child(3) {
                animation-delay: 0.4s;
            }

            @keyframes blink {

                0%,
                80%,
                100% {
                    opacity: 0.3;
                    transform: translateY(0);
                }

                40% {
                    opacity: 1;
                    transform: translateY(-2px);
                }
            }

            /* Input bar */
            .input-bar {
                background: var(--wa-header);
                padding: 10px 0;
                flex-shrink: 0;
            }

            .input-bar-inner {
                width: 100%;
                max-width: 900px;
                margin: 0 auto;
                padding: 0 24px;
                display: flex;
                align-items: center;
                gap: 10px;
                box-sizing: border-box;
            }

            .input-bar input {
                flex: 1;
                background: #2a3942;
                border: none;
                outline: none;
                color: var(--wa-text);
                padding: 10px 14px;
                border-radius: 22px;
                font-size: 14.5px;
            }

            .input-bar input::placeholder {
                color: var(--wa-subtext);
            }

            .send-btn {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: var(--wa-accent);
                border: none;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                flex-shrink: 0;
            }

            .send-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .send-btn svg {
                fill: #0b141a;
                width: 19px;
                height: 19px;
            }

            .chat-body::-webkit-scrollbar {
                width: 6px;
            }

            .chat-body::-webkit-scrollbar-thumb {
                background: #2a3942;
                border-radius: 3px;
            }
        </style>
    </head>

    <body>

        <div class="phone">
            <div class="chat-header">
                <div class="avatar">B</div>
                <div class="header-info">
                    <div class="header-name">Bae ❤️</div>
                    <div class="header-status" id="statusLine">online</div>
                </div>
                <div class="header-icons">📹 📞 ⋮</div>
            </div>

            <div class="chat-body" id="chatBodyOuter">
                <div class="chat-body-inner" id="chatBody">
                    <div class="day-chip">Today</div>
                </div>
            </div>

            <div class="input-bar">
                <div class="input-bar-inner">
                    <input type="text" id="msgInput" placeholder="Message" autocomplete="off" />
                    <button class="send-btn" id="sendBtn" aria-label="Send message">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <script>
            // ---- CONFIG ----
            // Point this to your backend endpoint (see server.js)
            const API_URL = "http://localhost:3000/chat";

            const chatBody = document.getElementById("chatBody");
            const chatBodyOuter = document.getElementById("chatBodyOuter");
            const msgInput = document.getElementById("msgInput");
            const sendBtn = document.getElementById("sendBtn");
            const statusLine = document.getElementById("statusLine");

            let history = []; // {role: "user"|"assistant", content: string}

            function timeNow() {
                return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            }

            function addBubble(text, sender) {
                const row = document.createElement("div");
                row.className = "row " + (sender === "user" ? "out" : "in");

                const bubble = document.createElement("div");
                bubble.className = "bubble";
                bubble.textContent = text;

                const meta = document.createElement("span");
                meta.className = "meta";
                meta.innerHTML = timeNow() + (sender === "user" ? ' <span class="ticks">✓✓</span>' : "");
                bubble.appendChild(meta);

                row.appendChild(bubble);
                chatBody.appendChild(row);
                chatBodyOuter.scrollTop = chatBodyOuter.scrollHeight;
            }

            function showTyping() {
                const row = document.createElement("div");
                row.className = "row in";
                row.id = "typingRow";
                row.innerHTML = `<div class="bubble typing-bubble"><span></span><span></span><span></span></div>`;
                chatBody.appendChild(row);
                chatBodyOuter.scrollTop = chatBodyOuter.scrollHeight;
                statusLine.textContent = "typing...";
                statusLine.classList.add("typing");
            }

            function hideTyping() {
                const row = document.getElementById("typingRow");
                if (row) row.remove();
                statusLine.textContent = "online";
                statusLine.classList.remove("typing");
            }

            async function sendMessage() {
                const text = msgInput.value.trim();
                if (!text) return;

                addBubble(text, "user");
                history.push({ role: "user", content: text });
                msgInput.value = "";
                sendBtn.disabled = true;
                showTyping();

                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: text, history }),
                    });

                    if (!res.ok) throw new Error("Server error: " + res.status);

                    const data = await res.json();
                    hideTyping();
                    addBubble(data.reply, "bot");
                    history.push({ role: "assistant", content: data.reply });
                } catch (err) {
                    hideTyping();
                    addBubble("Oops, connection issue: " + err.message, "bot");
                } finally {
                    sendBtn.disabled = false;
                }
            }

            sendBtn.addEventListener("click", sendMessage);
            msgInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") sendMessage();
            });
        </script>

    </body>

</html>
